<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery - Petit Girard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f8fafc;
}

/* ================= TOP BAR ================= */
.top-bar {
    background: #6b7280;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 8px 20px;
    font-size: 14px;
}

.top-bar .left,
.top-bar .right {
    display: flex;
    gap: 10px;
    align-items: center;
}

    .top-bar a {
    color: white;
    text-decoration: none;
}
    .top-bar a:link,
.top-bar a:visited,

.top-bar a:active {
    color: white;
    text-decoration: none;
}

    .top-bar a:hover {
    color: #ddd;
}

/* ================= NAVBAR ================= */
.nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* الجزء الشمال (لوجو + عنوان) */
.nav .left {
    display: flex;
    align-items: center;
    gap: 10px;
}
/* الجزء اليمين (اللينكات) */
.nav .right {
    display: flex;
    align-items: center;
    gap: 20px;
}  
.nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
}

.nav h2 {
    margin: 0;
    margin-left: 10px;
}

.logo {
    width: 50px;
    height: 50px;
    object-fit: cover;
}
    
    .nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav a {
    color: white;
    text-decoration: none;
}

.nav h2 {
    margin: 0;
}
    h2 {
    color: #1e293b;
}

/* ================= HERO ================= */
.hero {
    background: url("images/cover.jpg");
    margin-top: 20px;
    height: 500px;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0f172a;
    font-size: 30px;
}
    
    /* ================= MENU BUTTON ================= */
.menu-btn {
    display: none;
    font-size: 25px;
    cursor: pointer;
}

/* CONTENT */
.container {
    padding: 40px;
}

/* TEXT */
.text-box {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 30px;
}

/* IMAGES */
.gallery {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
}

.gallery img {
    width: 250px;
    border-radius: 10px;
}

/* VIDEOS */
.videos {
    margin-top: 40px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.videos video {
    width: 300px;
}

/* MOBILE */
@media (max-width: 600px) {
    .nav {
        flex-direction: column;
    }

    .gallery img,
    .videos video {
        width: 100%;
    }
}
</style>
</head>
