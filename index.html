<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f8fafc;
}

/* ================= TOP BAR ================= */
.top-bar {
    background: #6b7280;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 8px 20px;
    font-size: 14px;
}

.top-bar .left,
.top-bar .right {
    display: flex;
    gap: 10px;
    align-items: center;
}

    .top-bar a {
    color: white;
    text-decoration: none;
}
    .top-bar a:link,
.top-bar a:visited,

.top-bar a:active {
    color: white;
    text-decoration: none;
}

    .top-bar a:hover {
    color: #ddd;
}

/* ================= NAVBAR ================= */
.nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* الجزء الشمال (لوجو + عنوان) */
.nav .left {
    display: flex;
    align-items: center;
    gap: 10px;
}
/* الجزء اليمين (اللينكات) */
.nav .right {
    display: flex;
    align-items: center;
    gap: 20px;
}  
.nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
}

.nav h2 {
    margin: 0;
    margin-left: 10px;
}

.logo {
    width: 50px;
    height: 50px;
    object-fit: cover;
}
    
    .nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav a {
    color: white;
    text-decoration: none;
}

.nav h2 {
    margin: 0;
}
    h2 {
    color: #1e293b;
}

/* ================= HERO ================= */
.hero {
    background: url("images/cover.jpg");
    margin-top: 20px;
    height: 500px;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0f172a;
    font-size: 30px;
}
    
    /* ================= MENU BUTTON ================= */
.menu-btn {
    display: none;
    font-size: 25px;
    cursor: pointer;
}

/* ================= SECTIONS ================= */
.section {
    padding: 40px;
    text-align: center;
}

/* ================= GALLERY ================= */
.gallery {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.gallery img {
    width: 200px;
    border-radius: 10px;
}

/* ================= CONTACT ================= */
.contact {
    background: #0f172a;
    color: white;
    padding: 30px;
}

/* ================= LOGO ================= */
.logo {
    width: 50px;
    height: 50px;
}
    .section p {
    max-width: 700px;
    margin: 20px auto;
    font-size: 18px;
    line-height: 1.8;
    color: #334155;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* ================= MOBILE ================= */
@media (max-width: 600px) {

    /* TOP BAR */
    .top-bar {
        flex-direction: column;
        text-align: center;
        gap: 5px;
        font-size: 12px;
    }

    /* NAVBAR */
    .nav {
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
    }

    .nav .right {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }

    .nav a {
        margin: 0;
        font-size: 14px;
    }

    /* LOGO + TITLE */
    .logo {
        width: 40px;
        height: 40px;
    }

    h2 {
        font-size: 20px;
    }

    /* HERO */
    .hero {
        height: 250px;
        font-size: 18px;
        padding: 20px;
        text-align: center;
    }

    /* SECTIONS */
    .section {
        padding: 20px;
    }

    .section p {
        font-size: 16px;
        padding: 15px;
    }

    /* GALLERY */
    .gallery img {
        width: 100%;
        max-width: 300px;
    }

    /* CONTACT */
    .contact {
        padding: 20px;
        font-size: 14px;
    }
/* موبايل */
@media (max-width: 600px) {

    .menu-btn {
        display: block;
    }

    .nav {
        flex-wrap: wrap;
    }

    .nav .right {
        display: none;
        width: 100%;
        flex-direction: column;
        text-align: center;
        background: blue;
        margin-top: 10px;
    }

    .nav .right a {
        padding: 10px;
        border-top: 1px solid rgba(255,255,255,0.2);
    }

    .nav .right.show {
        display: flex;
    }
}}
}
