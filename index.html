<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Petit Girard Nursery</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f8fafc;
}

/* Navbar */
.nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
}
    
.nav h2 {
    margin: 0;
    margin-left: 10px;
}
/* Hero */
.hero {
    margin-top: 20px;
    margin-left: 20px;
    background: url("images/cover.jpg");
    height: 300px;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0f172a;
    font-size: 30px;
}

/* Sections */
.section {
    padding: 40px;
    text-align: center;
}

/* Gallery */
.gallery {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.gallery img {
    width: 200px;
    border-radius: 10px;
}

/* Contact */
.contact {
    background: #0f172a;
    color: white;
    padding: 30px;
}
    
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.logo {
    width: 50px;
    height: 50px;
}
    @media (max-width: 600px) {
    .hero {
        font-size: 18px;
        padding: 40px 10px;
    }

    .logo {
        width: 35px;
        height: 35px;
    }

    h2 {
        font-size: 18px;
         
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="nav">
    <img src="images/logo.jpg" alt="logo" class="logo">
    <h2>Petit Girard</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Hero -->
<div class="hero">
    
</div>

<!-- About -->
<div class="section">
    <h2>About Us</h2>
    <p>
        حضانة Petit Girard توفر بيئة آمنة وتعليمية للأطفال لتنمية مهاراتهم
        بطريقة ممتعة وتفاعلية.
    </p>
</div>

<!-- Gallery -->
<div class="section">
    <h2>Gallery</h2>
    <div class="gallery">
        <img src="images/1.jpg">
        <img src="images/2.jpg">
        <img src="images/3.jpg">
    </div>
</div>

<!-- Contact -->
<div class="contact">
    <h2>Contact Us</h2>
    <p>📍 262 Port Said St, Alexandria</p>
    <p>📞 01000026780</p>
    <p>📧 Petitgirard262@gmail.com</p>
</div>

</body>
</html>
