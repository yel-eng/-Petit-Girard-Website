<!DOCTYPE html>

<style>

body {
    font-family: Arial;
    margin: 0;
    background: #f8fafc;
}

/* ================= TOP BAR ================= */
.top-bar {
    background: #6b7280;
    color: white;
    display: flex;
    justify-content: space-between;
    padding: 8px 20px;
    font-size: 14px;
}

.top-bar .left,
.top-bar .right {
    display: flex;
    gap: 10px;
    align-items: center;
}

    .top-bar a {
    color: white;
    text-decoration: none;
}
    .top-bar a:link,
.top-bar a:visited,

.top-bar a:active {
    color: white;
    text-decoration: none;
}

    .top-bar a:hover {
    color: #ddd;
}

/* ================= NAVBAR ================= */
.nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
}

.nav h2 {
    margin: 0;
    margin-left: 10px;
}

    .nav {
    background: blue;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* الجزء الشمال (لوجو + عنوان) */
.nav .left {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* الجزء اليمين (اللينكات) */
.nav .right {
    display: flex;
    align-items: center;
    gap: 20px;
}

.nav a {
    color: white;
    text-decoration: none;
}

.nav h2 {
    margin: 0;
}

/* ================= HERO ================= */
.hero {
    margin-top: 20px;
    background: url("images/cover.jpg");
    height: 500px;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0f172a;
    font-size: 30px;
}

/* ================= SECTIONS ================= */
.section {
    padding: 40px;
    text-align: center;
}

/* ================= GALLERY ================= */
.gallery {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
}

.gallery img {
    width: 200px;
    border-radius: 10px;
}

/* ================= CONTACT ================= */
.contact {
    background: #0f172a;
    color: white;
    padding: 30px;
}

/* ================= LOGO ================= */
.logo {
    width: 50px;
    height: 50px;
}
    .section p {
    max-width: 700px;
    margin: 20px auto;
    font-size: 18px;
    line-height: 1.8;
    color: #334155;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* ================= MOBILE ================= */
@media (max-width: 600px) {

    .hero {
        font-size: 18px;
        height: 300px;
    }

    .logo {
        width: 35px;
        height: 35px;
    }

    h2 {
        font-size: 18px;
    }

    .top-bar {
        flex-direction: column;
        text-align: center;
        gap: 5px;
    }

    .nav {
        flex-direction: column;
        gap: 10px;
    }
}

</style>
